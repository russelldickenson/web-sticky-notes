<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Notes</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 448 512'%3E%3Cpath fill='%23facc15' stroke='black' stroke-width='15' d='M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H192l256-256V96c0-35.3-28.7-64-64-64H64z'/%3E%3Cpath fill='%23fde047' stroke='black' stroke-width='10' d='M192 480l256-256H224c-17.6 0-32 14.4-32 32v224z'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --note-bg: #fef08a; /* yellow-200 */
      --note-header-bg: #fde047; /* yellow-300 */
      --note-text: #374151; /* gray-700 */
      --delete-btn-color: #713f12;
      --delete-btn-bg: rgba(255, 255, 255, 0.3);
      --delete-btn-hover: rgba(255, 255, 255, 0.5);
      --tooltip-bg: rgba(0, 0, 0, 0.85);
      --tooltip-text: #ffffff;
      --tooltip-border: rgba(255, 255, 255, 0.1);
      --scroll-thumb: rgba(156, 163, 175, 0.5);
      --shadow-color: rgba(0, 0, 0, 0.15);
      --shadow-hover-color: rgba(0, 0, 0, 0.25);
      --text-dim: rgba(0,0,0,0.8);
      --border: rgba(0,0,0,0.1);
      --btn-bg: rgba(0,0,0,0.06);
      --btn-border: rgba(0,0,0,0.12);
      --btn-hover: rgba(0,0,0,0.1);
      --accent: #4a6fa5;
      --accent-hover: #3d5d8a;
      --shadow: rgba(0,0,0,0.08);
      --shadow-lg: rgba(0,0,0,0.12);
    }

    .dark {
      --note-bg: #424206;
      --note-header-bg: #71710a;
      --note-text: #fef9c3;
      --delete-btn-color: #fef08a;
      --delete-btn-bg: rgba(0, 0, 0, 0.20);
      --delete-btn-hover: rgba(0, 0, 0, 0.35);
      --tooltip-bg: rgba(255, 255, 255, 0.95);
      --tooltip-text: #000000;
      --tooltip-border: rgba(0, 0, 0, 0.1);
      --scroll-thumb: rgba(75, 85, 99, 0.5);
      --shadow-color: rgba(0, 0, 0, 0.4);
      --shadow-hover-color: rgba(0, 0, 0, 0.6);
      --text-dim: rgba(255,255,255,0.5);
      --border: rgba(255,255,255,0.1);
      --btn-bg: rgba(255,255,255,0.08);
      --btn-border: rgba(255,255,255,0.15);
      --btn-hover: rgba(255,255,255,0.15);
      --accent: #e94560;
      --accent-hover: #c73a52;
      --shadow: rgba(0,0,0,0.3);
      --shadow-lg: rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      transition: background-color 0.3s ease;
    }

    /* Note Styles with Transitions */
    .note {
      position: absolute;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 10px -1px var(--shadow-color), 0 2px 6px -1px rgba(0, 0, 0, 0.15);
      border-radius: 0.375rem;
      width: 200px;
      min-height: 150px;
      background-color: var(--note-bg);
      overflow: visible !important;
      transition: background-color 0.3s ease, box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .note.selected {
      box-shadow: 0 15px 25px -5px var(--shadow-hover-color), 0 8px 10px -6px rgba(0, 0, 0, 0.2);
      z-index: calc(var(--note-z, 0) + 10000) !important;
    }

    .note-header {
      background-color: var(--note-header-bg);
      height: 2rem;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 0.5rem;
      flex-shrink: 0;
      border-top-left-radius: 0.375rem;
      border-top-right-radius: 0.375rem;
      transition: background-color 0.3s ease;
      touch-action: none; /* Prevents mobile scrolling when dragging notes */
    }

    .note-header.dragging {
      cursor: grabbing;
    }

    .note-body {
      flex-grow: 1;
      padding: 1rem;
      position: relative;
      display: flex;
      flex-direction: column;
      border-bottom-left-radius: 0.375rem;
      border-bottom-right-radius: 0.375rem;
      overflow: hidden;
    }

    .note-textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      resize: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--note-text);
      transition: color 0.3s ease;
    }

    .delete-btn {
      opacity: 0;
      transition: opacity 0.2s ease-in-out, background-color 0.2s ease, color 0.2s ease;
      color: var(--delete-btn-color);
      cursor: pointer;
      font-size: 0.875rem;
      background: var(--delete-btn-bg);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background: var(--delete-btn-hover);
    }

    .note.selected .delete-btn {
      opacity: 1;
    }

    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(0, 0, 0, 0.15) 50%);
      transition: background 0.2s ease;
      touch-action: none; /* Prevents mobile scrolling when resizing notes */
    }

    .resize-handle:hover {
      background: linear-gradient(135deg, transparent 50%, rgba(0, 0, 0, 0.3) 50%);
    }

    #canvas {
      width: 100vw;
      height: calc(100vh - 4rem);
      position: relative;
      overflow: auto;
    }

    /* Custom scrollbar styles */
    #canvas::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    #canvas::-webkit-scrollbar-track {
      background: transparent;
    }

    #canvas::-webkit-scrollbar-thumb {
      background-color: var(--scroll-thumb);
      border-radius: 9999px;
    }

    /* Tooltip Style with variables and rounded edges */
    .tooltip-text {
      opacity: 0;
      visibility: hidden;
      position: absolute;
      top: 115%;
      white-space: nowrap;
      background-color: var(--tooltip-bg);
      color: var(--tooltip-text);
      backdrop-filter: blur(4px);
      border: 1px solid var(--tooltip-border);
      border-radius: 0.375rem;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      z-index: 10000;
      pointer-events: none;
      transition: opacity 0.1s ease-in, visibility 0.1s, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      transition-delay: 0s;
    }

    .group:hover .tooltip-text {
      opacity: 1;
      visibility: visible;
      transition-delay: 1s;
    }

    .tooltip-center {
      left: 50%;
      transform: translateX(-50%);
    }

    .tooltip-left {
      left: 0;
      transform: translateX(0);
    }

    .tooltip-right {
      right: 0;
      transform: translateX(0);
    }

    /* Header Buttons */
    .header-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text-dim);
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.2s ease,
                  border-color 0.2s ease;
    }

    .header-btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow-lg);
    }

    #grid-toggle { opacity: 0.7; }
    #grid-toggle.active { opacity: 1; color: var(--accent); }

    #add-note-btn {
      background: var(--btn-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--text-dim);
      border-color: var(--border);
    }
    #add-note-btn:hover {
      background: var(--btn-hover);
      border-color: var(--text-dim);
    }
    #add-note-btn:active {
      transform: translateY(1px) scale(0.98);
    }
    #add-note-btn svg {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #add-note-btn:hover svg {
      transform: rotate(90deg);
    }

    .icon-sun,
    .icon-moon { display: none; }
    .dark .icon-sun { display: block; }
    :root:not(.dark) .icon-moon { display: block; }

    /* Grid background style when enabled */
    #canvas.grid-bg {
      background-size: 20px 20px;
      background-image: 
        linear-gradient(to right, rgba(156, 163, 175, 0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(156, 163, 175, 0.08) 1px, transparent 1px);
    }
    .dark #canvas.grid-bg {
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    }


  </style>
</head>

<body class="h-screen flex flex-col bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <header
    class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 shadow-sm z-[100] relative !overflow-visible">
    <div class="flex flex-col items-center absolute left-1/2 -translate-x-1/2">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-note-sticky text-yellow-400 text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-800 dark:text-white">Sticky Notes</h1>
      </div>
      <span id="board-name"
        class="text-[10px] uppercase tracking-widest text-gray-400 dark:text-gray-500 font-semibold">Default
        board</span>
    </div>

    <div class="flex items-center gap-2 ml-auto !overflow-visible">
      <div class="group relative !overflow-visible">
        <button id="grid-toggle" class="header-btn" aria-label="Toggle grid snap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <span class="tooltip-text tooltip-left">Toggle grid snap</span>
      </div>
      <div class="group relative !overflow-visible">
        <button id="theme-toggle" class="header-btn" aria-label="Toggle theme">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <span class="tooltip-text tooltip-left">Toggle theme</span>
      </div>
      <div class="group relative !overflow-visible">
        <button id="add-note-btn" class="header-btn" aria-label="Add new note">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <span class="tooltip-text tooltip-right">Add new note (Cmd/Ctrl + .)</span>
      </div>
    </div>
  </header>

  <main id="canvas"></main>

  <div id="modal-overlay" class="fixed inset-0 hidden items-center justify-center z-[200]">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 w-80 border border-transparent dark:border-gray-700">
      <div class="flex items-center gap-3 mb-4 text-red-500">
        <i class="fa-solid fa-triangle-exclamation text-xl"></i>
        <h3 class="text-base font-bold text-gray-900 dark:text-white">Delete note?</h3>
      </div>
      <p class="text-gray-600 dark:text-gray-400 mb-6">Are you sure you want to delete this sticky note? This action
        cannot be undone.</p>
      <div class="flex justify-end gap-3">
        <button id="cancel-delete"
          class="px-4 py-2 text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-md transition-colors">Cancel</button>
        <button id="confirm-delete"
          class="px-4 py-2 text-white bg-red-500 hover:bg-red-600 rounded-md transition-colors shadow-sm">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const boardId = urlParams.get('board') || 'default';
    const STORAGE_KEY = `stickyNotes_${boardId}`;
    const THEME_KEY = 'stickyNotes_theme';

    const themeToggle = document.getElementById('theme-toggle');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      localStorage.setItem(THEME_KEY, theme);
    }

    applyTheme(localStorage.getItem(THEME_KEY) || 'light');
    themeToggle.addEventListener('click', () => applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'));

    document.getElementById('board-name').textContent = `${boardId} board`;

    let notes = [];
    let noteToDeleteId = null;
    let highestZIndex = 10;

    const storedNotes = localStorage.getItem(STORAGE_KEY);
    if (storedNotes) {
      notes = JSON.parse(storedNotes);
      notes.forEach(n => { if (n.zIndex > highestZIndex) highestZIndex = n.zIndex; });
    }

    const canvas = document.getElementById('canvas');
    const addBtn = document.getElementById('add-note-btn');
    const modalOverlay = document.getElementById('modal-overlay');

    // Grid Snapping Config & State
    const GRID_KEY = 'stickyNotes_gridSnap';
    const GRID_SIZE = 20;
    const gridToggle = document.getElementById('grid-toggle');
    let gridSnapActive = localStorage.getItem(GRID_KEY) === 'true';

    function snap(val) {
      if (!gridSnapActive) return val;
      return Math.round(val / GRID_SIZE) * GRID_SIZE;
    }

    function applyGridSnap(active) {
      gridSnapActive = active;
      localStorage.setItem(GRID_KEY, active);
      if (active) {
        gridToggle.classList.add('active');
        canvas.classList.add('grid-bg');
      } else {
        gridToggle.classList.remove('active');
        canvas.classList.remove('grid-bg');
      }
    }

    applyGridSnap(gridSnapActive);

    gridToggle.addEventListener('click', () => {
      applyGridSnap(!gridSnapActive);
      if (gridSnapActive) {
        // Snap all existing notes to the grid
        notes.forEach(note => {
          note.x = snap(note.x);
          note.y = snap(note.y);
          note.width = snap(note.width);
          note.height = snap(note.height);
          const el = document.getElementById(note.id);
          if (el) {
            el.style.left = `${note.x}px`;
            el.style.top = `${note.y}px`;
            el.style.width = `${note.width}px`;
            el.style.height = `${note.height}px`;
          }
        });
        saveNotes();
      }
    });

    // Debounce function to limit frequent localStorage writes on input
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function renderNotes() {
      canvas.innerHTML = '';
      notes.forEach(createNoteElement);
    }

    function selectNote(noteEl) {
      canvas.querySelectorAll('.note.selected').forEach(n => n.classList.remove('selected'));
      noteEl.classList.add('selected');
      highestZIndex++;
      noteEl.style.zIndex = highestZIndex;
      noteEl.style.setProperty('--note-z', highestZIndex);
      const note = notes.find(n => n.id === noteEl.id);
      if (note) {
        note.zIndex = highestZIndex;
        saveNotes();
      }
    }

    function createNoteData() {
      const newNote = {
        id: Date.now().toString(36),
        content: '',
        x: snap(50 + Math.random() * 100),
        y: snap(50 + Math.random() * 100),
        width: snap(250),
        height: snap(250),
        zIndex: ++highestZIndex
      };
      notes.push(newNote);
      saveNotes();
      const noteEl = createNoteElement(newNote);
      selectNote(noteEl);
      noteEl.querySelector('textarea').focus();
    }

    function saveNotes() { 
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); 
    }

    const debouncedSaveNotes = debounce(saveNotes, 300);

    function createNoteElement(noteData) {
      const noteEl = document.createElement('div');
      noteEl.className = 'note';
      noteEl.id = noteData.id;
      noteEl.style.cssText = `left:${noteData.x}px; top:${noteData.y}px; width:${noteData.width}px; height:${noteData.height}px; z-index:${noteData.zIndex}; --note-z:${noteData.zIndex}`;

      // XSS Protection: We do NOT interpolate noteData.content inside HTML strings.
      // Instead, we set the textarea value programmatically below.
      noteEl.innerHTML = `
        <div class="note-header">
          <div class="group relative">
            <button class="delete-btn">
              <i class="fa-solid fa-trash-can"></i>
            </button>
            <span class="tooltip-text tooltip-center">Delete note</span>
          </div>
        </div>
        <div class="note-body">
          <textarea class="note-textarea" placeholder="Type your note here..."></textarea>
          <div class="resize-handle"></div>
        </div>`;

      const textarea = noteEl.querySelector('.note-textarea');
      textarea.value = noteData.content;

      textarea.oninput = (e) => {
        const note = notes.find(n => n.id === noteData.id);
        if (note) {
          note.content = e.target.value;
          debouncedSaveNotes();
        }
      };

      noteEl.addEventListener('pointerdown', () => selectNote(noteEl));

      noteEl.querySelector('.delete-btn').onclick = (e) => {
        e.stopPropagation();
        noteToDeleteId = noteData.id;
        modalOverlay.classList.replace('hidden', 'flex');
      };

      // Dragging using document level addEventListener/removeEventListener to prevent overwriting
      const header = noteEl.querySelector('.note-header');
      header.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.delete-btn')) return;
        
        // Add dragging class to show grabbing cursor
        header.classList.add('dragging');
        
        selectNote(noteEl);
        
        const startX = e.clientX - noteEl.offsetLeft;
        const startY = e.clientY - noteEl.offsetTop;

        // Capture boundaries at the start of the drag to prevent dynamic expansion as the note moves
        const maxX = Math.max(canvas.clientWidth, canvas.scrollWidth) - noteEl.offsetWidth;
        const maxY = Math.max(canvas.clientHeight, canvas.scrollHeight) - noteEl.offsetHeight;

        const onPointerMove = (me) => {
          let newX = me.clientX - startX;
          let newY = me.clientY - startY;

          // Apply snap dynamically if active
          newX = snap(newX);
          newY = snap(newY);

          // Boundary checks: keep the notes on the canvas viewport space
          newX = Math.max(0, Math.min(newX, maxX));
          newY = Math.max(0, Math.min(newY, maxY));

          noteEl.style.left = `${newX}px`;
          noteEl.style.top = `${newY}px`;
        };

        const onPointerUp = () => {
          header.classList.remove('dragging');
          document.removeEventListener('pointermove', onPointerMove);
          document.removeEventListener('pointerup', onPointerUp);
          const note = notes.find(n => n.id === noteData.id);
          if (note) {
            note.x = parseInt(noteEl.style.left);
            note.y = parseInt(noteEl.style.top);
            saveNotes();
          }
        };

        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
      });

      // Resizing using document level addEventListener/removeEventListener to prevent overwriting
      const resizer = noteEl.querySelector('.resize-handle');
      resizer.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        selectNote(noteEl);
        const startW = noteEl.offsetWidth;
        const startH = noteEl.offsetHeight;
        const startX = e.clientX;
        const startY = e.clientY;

        // Capture boundaries at the start of the resize to prevent dynamic expansion as the note grows
        const maxX = Math.max(canvas.clientWidth, canvas.scrollWidth) - noteEl.offsetLeft;
        const maxY = Math.max(canvas.clientHeight, canvas.scrollHeight) - noteEl.offsetTop;

        const onPointerMove = (me) => {
          let newW = startW + me.clientX - startX;
          let newH = startH + me.clientY - startY;

          // Apply snap dynamically if active
          newW = snap(newW);
          newH = snap(newH);

          // Boundary checks: don't resize notes past the canvas boundary
          newW = Math.max(150, Math.min(newW, maxX));
          newH = Math.max(150, Math.min(newH, maxY));

          noteEl.style.width = `${newW}px`;
          noteEl.style.height = `${newH}px`;
        };

        const onPointerUp = () => {
          document.removeEventListener('pointermove', onPointerMove);
          document.removeEventListener('pointerup', onPointerUp);
          const note = notes.find(n => n.id === noteData.id);
          if (note) {
            note.width = noteEl.offsetWidth;
            note.height = noteEl.offsetHeight;
            saveNotes();
          }
        };

        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
      });

      canvas.appendChild(noteEl);
      return noteEl;
    }

    // --- Global Keyboard Handling ---
    document.addEventListener('keydown', (e) => {
      const isModKey = e.metaKey || e.ctrlKey;

      if (isModKey && e.key === '.') {
        e.preventDefault();
        createNoteData();
      }

      if (isModKey && e.key === 'Enter') {
        if (document.activeElement && document.activeElement.tagName === 'TEXTAREA') {
          e.preventDefault();
          document.activeElement.blur();
        }
      }
    });

    canvas.addEventListener('pointerdown', (e) => {
      if (e.target === canvas) {
        canvas.querySelectorAll('.note.selected').forEach(n => n.classList.remove('selected'));
      }
    });

    addBtn.onclick = createNoteData;
    document.getElementById('cancel-delete').onclick = () => modalOverlay.classList.replace('flex', 'hidden');
    document.getElementById('confirm-delete').onclick = () => {
      notes = notes.filter(n => n.id !== noteToDeleteId);
      const el = document.getElementById(noteToDeleteId);
      if (el) el.remove();
      saveNotes();
      modalOverlay.classList.replace('flex', 'hidden');
    };

    renderNotes();
  </script>
</body>

</html>

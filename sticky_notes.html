<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    // Configure Tailwind to use 'dark' class for dark mode
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      transition: background-color 0.3s ease;
    }

    /* Note Styles - Light Mode */
    .note {
      position: absolute;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      border-radius: 0.375rem;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.1s;
      width: 200px;
      min-height: 150px;
    }

    .note:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      z-index: 10;
    }

    .note-header {
      background-color: #fde047;
      /* Yellow-300 */
      height: 2rem;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 0.5rem;
      flex-shrink: 0;
    }

    .note-body {
      background-color: #fef08a;
      /* Yellow-200 */
      flex-grow: 1;
      padding: 1rem;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .note-textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      resize: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      color: #374151;
      overflow: auto;
    }

    /* Dark Mode Note Overrides - Muted Yellow */
    .dark .note {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
    }

    .dark .note-header {
      background-color: #71710a;
      /* Muted olive-yellow header */
    }

    .dark .note-body {
      background-color: #424206;
      /* Deep muted yellow-gray body */
    }

    .dark .note-textarea {
      color: #fef9c3;
    }

    /* Delete Button */
    .delete-btn {
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      color: #713f12;
      cursor: pointer;
      font-size: 0.875rem;
      background: rgba(255, 255, 255, 0.3);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .dark .delete-btn {
      color: #fef08a;
      background: rgba(0, 0, 0, 0.2);
    }

    .note:hover .delete-btn {
      opacity: 1;
    }

    /* Resize Handle */
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
      border-bottom-right-radius: 0.375rem;
      z-index: 20;
    }

    .dark .resize-handle {
      background: linear-gradient(135deg, transparent 50%, rgba(255, 255, 255, 0.1) 50%);
    }

    #modal-overlay {
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }

    #canvas {
      width: 100vw;
      height: calc(100vh - 4rem);
      position: relative;
      overflow: auto;
    }
  </style>
</head>

<body class="h-screen flex flex-col bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <!-- Header -->
  <header
    class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6 shadow-sm z-50 relative">
    <div class="flex items-center gap-2">
      <!-- Theme Toggle -->
      <button id="theme-toggle" title="Toggle theme"
        class="w-10 h-10 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-[4px] transition-colors">
        <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
      </button>
    </div>

    <div class="flex flex-col items-center absolute left-1/2 -translate-x-1/2">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-note-sticky text-yellow-400 text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-800 dark:text-white">Sticky Notes</h1>
      </div>
      <span id="board-name"
        class="text-[10px] uppercase tracking-widest text-gray-400 dark:text-gray-500 font-semibold">Default
        Board</span>
    </div>

    <button id="add-note-btn" title="New note"
      class="w-10 h-10 flex items-center justify-center bg-green-500 hover:bg-green-600 text-white rounded-[4px] shadow-md transition-all duration-200 z-10">
      <i class="fa-solid fa-plus text-lg"></i>
    </button>
  </header>

  <!-- Canvas -->
  <main id="canvas">
    <!-- Notes will be injected here -->
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="modal-overlay" class="fixed inset-0 hidden items-center justify-center z-[100]">
    <div
      class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 w-80 transform transition-all scale-100 border border-transparent dark:border-gray-700">
      <div class="flex items-center gap-3 mb-4 text-red-500">
        <i class="fa-solid fa-triangle-exclamation text-xl"></i>
        <h3 class="text-lg font-bold text-gray-900 dark:text-white">Delete Note?</h3>
      </div>
      <p class="text-gray-600 dark:text-gray-400 mb-6">Are you sure you want to delete this sticky note? This action
        cannot be undone.</p>
      <div class="flex justify-end gap-3">
        <button id="cancel-delete"
          class="px-4 py-2 text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-md transition-colors">
          Cancel
        </button>
        <button id="confirm-delete"
          class="px-4 py-2 text-white bg-red-500 hover:bg-red-600 rounded-md transition-colors shadow-sm">
          Delete
        </button>
      </div>
    </div>
  </div>

  <script>
    // --- Multi-Board & Theme Logic ---
    const urlParams = new URLSearchParams(window.location.search);
    const boardId = urlParams.get('board') || 'default';
    const STORAGE_KEY = `stickyNotes_${boardId}`;
    const THEME_KEY = 'stickyNotes_theme';

    // --- Theme Management ---
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
      } else {
        document.documentElement.classList.remove('dark');
        themeIcon.classList.replace('fa-sun', 'fa-moon');
      }
      localStorage.setItem(THEME_KEY, theme);
    }

    // Init Theme
    const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
    applyTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.contains('dark');
      applyTheme(isDark ? 'light' : 'dark');
    });

    // Board UI
    document.getElementById('board-name').textContent = `${boardId} Board`;

    // --- State Management ---
    let notes = [];
    let noteToDeleteId = null;
    let highestZIndex = 10;

    const storedNotes = localStorage.getItem(STORAGE_KEY);
    if (storedNotes) {
      try {
        notes = JSON.parse(storedNotes);
        notes.forEach(n => {
          if (n.zIndex > highestZIndex) highestZIndex = n.zIndex;
        });
      } catch (e) {
        console.error("Failed to parse notes", e);
        notes = [];
      }
    }

    const canvas = document.getElementById('canvas');
    const addBtn = document.getElementById('add-note-btn');
    const modalOverlay = document.getElementById('modal-overlay');
    const cancelDeleteBtn = document.getElementById('cancel-delete');
    const confirmDeleteBtn = document.getElementById('confirm-delete');

    function renderNotes() {
      canvas.innerHTML = '';
      notes.forEach(note => createNoteElement(note));
    }

    renderNotes();

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function createNoteData() {
      const x = 50 + (Math.random() * 100);
      const y = 50 + (Math.random() * 100);

      const newNote = {
        id: generateId(),
        content: '',
        x: x,
        y: y,
        width: 250,
        height: 250,
        zIndex: ++highestZIndex
      };
      notes.push(newNote);
      saveNotes();
      createNoteElement(newNote);
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function updateNote(id, updates) {
      const noteIndex = notes.findIndex(n => n.id === id);
      if (noteIndex !== -1) {
        notes[noteIndex] = { ...notes[noteIndex], ...updates };
        saveNotes();
      }
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      saveNotes();
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function bringToFront(id) {
      const note = notes.find(n => n.id === id);
      if (note && note.zIndex !== highestZIndex) {
        highestZIndex++;
        note.zIndex = highestZIndex;
        const el = document.getElementById(id);
        if (el) el.style.zIndex = highestZIndex;
        saveNotes();
      }
    }

    function createNoteElement(noteData) {
      const noteEl = document.createElement('div');
      noteEl.classList.add('note');
      noteEl.id = noteData.id;

      noteEl.style.left = `${noteData.x}px`;
      noteEl.style.top = `${noteData.y}px`;
      noteEl.style.width = `${noteData.width}px`;
      noteEl.style.height = `${noteData.height || 250}px`;
      noteEl.style.zIndex = noteData.zIndex;

      noteEl.innerHTML = `
                <div class="note-header">
                    <button class="delete-btn" title="Delete note">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                <div class="note-body">
                    <textarea class="note-textarea" placeholder="Type your note here...">${noteData.content}</textarea>
                    <div class="resize-handle"></div>
                </div>
            `;

      const textarea = noteEl.querySelector('textarea');
      textarea.addEventListener('input', (e) => {
        updateNote(noteData.id, { content: e.target.value });
      });

      noteEl.addEventListener('mousedown', () => {
        bringToFront(noteData.id);
      });

      const deleteBtn = noteEl.querySelector('.delete-btn');
      deleteBtn.addEventListener('mousedown', (e) => e.stopPropagation());
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        noteToDeleteId = noteData.id;
        modalOverlay.classList.remove('hidden');
        modalOverlay.classList.add('flex');
      });

      const header = noteEl.querySelector('.note-header');
      header.addEventListener('mousedown', (e) => {
        if (e.target.closest('.delete-btn')) return;
        e.preventDefault();

        let startX = e.clientX;
        let startY = e.clientY;
        let startLeft = noteEl.offsetLeft;
        let startTop = noteEl.offsetTop;

        const onMouseMove = (moveEvent) => {
          const dx = moveEvent.clientX - startX;
          const dy = moveEvent.clientY - startY;
          noteEl.style.left = `${startLeft + dx}px`;
          noteEl.style.top = `${startTop + dy}px`;
        };

        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          updateNote(noteData.id, {
            x: parseInt(noteEl.style.left),
            y: parseInt(noteEl.style.top)
          });
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });

      const resizer = noteEl.querySelector('.resize-handle');
      resizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();

        let startX = e.clientX;
        let startY = e.clientY;
        let startWidth = parseInt(document.defaultView.getComputedStyle(noteEl).width, 10);
        let startHeight = parseInt(document.defaultView.getComputedStyle(noteEl).height, 10);

        const onMouseMove = (moveEvent) => {
          const dx = moveEvent.clientX - startX;
          const dy = moveEvent.clientY - startY;

          let newWidth = startWidth + dx;
          let newHeight = startHeight + dy;

          if (newWidth < 150) newWidth = 150;
          if (newHeight < 150) newHeight = 150;

          noteEl.style.width = `${newWidth}px`;
          noteEl.style.height = `${newHeight}px`;
        };

        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          updateNote(noteData.id, {
            width: parseInt(noteEl.style.width),
            height: parseInt(noteEl.style.height)
          });
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });

      canvas.appendChild(noteEl);
    }

    addBtn.addEventListener('click', createNoteData);

    const closeModal = () => {
      modalOverlay.classList.add('hidden');
      modalOverlay.classList.remove('flex');
      noteToDeleteId = null;
    };

    cancelDeleteBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    confirmDeleteBtn.addEventListener('click', () => {
      if (noteToDeleteId) {
        deleteNote(noteToDeleteId);
        closeModal();
      }
    });

  </script>
</body>

</html>
